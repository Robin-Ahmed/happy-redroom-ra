<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REDROOM | Premium Streaming</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary-color: #e50914; --bg-dark: #0f0f0f; --card-bg: #1f1f1f; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: white; }

        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 10px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 1px solid #333;
        }

        /* Center Profile Style */
        .user-profile {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .user-profile i { color: var(--primary-color); font-size: 18px; }
        .user-profile span { font-size: 10px; color: #aaa; font-weight: 600; text-transform: capitalize; }

        .logo { color: var(--primary-color); font-size: 20px; font-weight: 700; }
        .folder-btn { color: #ffca28; cursor: pointer; font-size: 18px; }

        .video-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; padding: 20px 5%; }
        .video-card { background: var(--card-bg); border-radius: 12px; overflow: hidden; position: relative; border: 1px solid #2a2a2a; }
        .ads-overlay { position: absolute; top: 0; right: 0; width: 60px; height: 60px; z-index: 100; cursor: pointer; }
        .video-card iframe { width: 100%; height: 180px; border: none; }
        .video-info { padding: 12px; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .download-btn { flex: 1; padding: 8px; text-align: center; background: #333; color: white; border-radius: 6px; text-decoration: none; font-size: 12px; font-weight: 600; }
        
        #folderOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #121212; z-index: 2000; overflow-y: auto; }
        .file-item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #222; cursor: pointer; }
    </style>
</head>
<body>

<header>
    <div class="logo">REDROOM</div>
    
    <div class="user-profile">
        <i class="fas fa-user-circle"></i>
        <span id="displayUserName">Guest</span>
    </div>

    <div class="folder-btn" onclick="openFolder()"><i class="fas fa-folder-open"></i></div>
</header>

<div class="video-container" id="videoList"></div>

<div id="folderOverlay">
    <div style="padding: 20px; border-bottom: 1px solid #333; display: flex; justify-content: space-between;">
        <span>Files Helper</span>
        <i class="fas fa-times" onclick="closeFolder()"></i>
    </div>
    <div id="fileListContainer"></div>
</div>

<script>
    let allVideos = [];
    const apiKey = "AIzaSyD7fZ8nt8LFa9iY8GfDBfhakIR2aqSE-Ms"; 
    const folderId = "1C78cLvYYP2AHaalMutvlJaNx0UjtgcIq";

    // ইউজার নেম সেট করা
    window.onload = () => {
        const savedName = localStorage.getItem("userName");
        if(savedName) document.getElementById("displayUserName").innerText = savedName;
        loadVideos();
    };

    async function loadVideos() {
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${apiKey}&fields=files(id,name,mimeType)`;
        const res = await fetch(url);
        const data = await res.json();
        allVideos = data.files.filter(f => f.mimeType.includes("video"));
        renderVideos(allVideos);
    }

    function renderVideos(videos) {
        const list = document.getElementById("videoList");
        list.innerHTML = "";
        videos.forEach(file => {
            const card = document.createElement("div");
            card.className = "video-card";
            card.innerHTML = `
                <a href="ads.html" class="ads-overlay"></a>
                <iframe src="https://drive.google.com/file/d/${file.id}/preview"></iframe>
                <div class="video-info">
                    <div style="font-size:12px;">${file.name}</div>
                    <div class="btn-group">
                        <div style="flex:1; font-size:11px; color:#888;"><i class="fas fa-eye"></i> 4.2k</div>
                        <a href="ads.html" class="download-btn">Download</a>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    function openFolder() {
        const container = document.getElementById("fileListContainer");
        container.innerHTML = "";
        allVideos.forEach(file => {
            const item = document.createElement("div");
            item.className = "file-item";
            item.onclick = () => { closeFolder(); renderVideos([file]); };
            item.innerHTML = `<i class="fas fa-video" style="color:#ffca28; margin-right:15px;"></i> ${file.name}`;
            container.appendChild(item);
        });
        document.getElementById("folderOverlay").style.display = "block";
    }
    function closeFolder() { document.getElementById("folderOverlay").style.display = "none"; }
</script>
</body>
</html>
