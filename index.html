<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Official Media Page</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
body{
    margin:0;
    font-family:'Inter',sans-serif;
    background:#f0f2f5;
}

/* Header */
.header{
    background:#1877f2;
    color:white;
    padding:15px 20px;
    font-size:22px;
    font-weight:700;
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}

/* Cover */
.cover{
    margin-top:60px;
    height:200px;
    background:url('https://picsum.photos/1000/400?random=21') center/cover;
    background-size:cover;
}

/* Video Gallery */
.gallery{
    padding:10px;
    display:grid;
    grid-template-columns: repeat(auto-fill,minmax(250px,1fr));
    gap:10px;
}

.video-card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 1px 4px rgba(0,0,0,0.2);
}

.video-card video{
    width:100%;
    display:block;
}

.video-title{
    padding:10px;
    font-weight:600;
}
</style>
</head>
<body>

<div class="header">Official Media Page</div>
<div class="cover"></div>

<div class="gallery" id="galleryPage">
    <!-- Videos will appear here -->
</div>

<script>
// -------------------
// Sample video URLs (Safe, Public)
// Replace these URLs with your own public mp4 links
// -------------------
const videoList = [
    "https://sample-videos.com/video123/mp4/480/big_buck_bunny_480p_5mb.mp4",
    "https://sample-videos.com/video123/mp4/480/big_buck_bunny_480p_1mb.mp4",
    "https://sample-videos.com/video123/mp4/480/big_buck_bunny_480p_2mb.mp4",
    "https://sample-videos.com/video123/mp4/480/big_buck_bunny_480p_5mb.mp4",
    "https://sample-videos.com/video123/mp4/480/big_buck_bunny_480p_1mb.mp4"
];

const gallery = document.getElementById("galleryPage");

// Generate video cards
videoList.forEach((url,i)=>{
    const card = document.createElement("div");
    card.className = "video-card";
    card.innerHTML = `
        <video controls>
            <source src="${url}" type="video/mp4">
            Your browser does not support HTML5 video.
        </video>
        <div class="video-title">Video ${i+1}</div>
    `;
    gallery.appendChild(card);
});
</script>

</body>
</html>
