<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REDROOM | Premium Streaming</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e50914;
            --bg-dark: #0f0f0f;
            --card-bg: #1f1f1f;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-white); overflow-x: hidden; }

        /* HEADER */
        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 12px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
        }

        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo { color: var(--primary-color); font-size: 22px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Folder/Gallery Button Style */
        .folder-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #2a2a2a;
            padding: 6px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: 0.3s;
            color: #ffca28; /* Folder Yellow Color */
            font-size: 13px;
            font-weight: 500;
            border: 1px solid #444;
        }
        .folder-btn:hover { background: #333; border-color: #ffca28; }

        .search-container { margin: 20px 5%; }
        #searchBox {
            width: 100%;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 8px;
            color: white;
            outline: none;
        }

        /* MAIN VIDEO GRID */
        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 5% 40px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }
        .video-card iframe { width: 100%; height: 180px; border: none; background: #000; }
        .video-info { padding: 12px; }
        .video-title { font-size: 13px; margin-bottom: 10px; height: 38px; overflow: hidden; color: #ddd; }

        .btn-group { display: flex; gap: 10px; }
        .view-stat {
            flex: 1; background: #262626; color: #aaa;
            padding: 8px; border-radius: 6px; font-size: 11px;
            display: flex; align-items: center; justify-content: center; gap: 5px;
        }
        .download-btn {
            flex: 1; padding: 8px; text-align: center;
            background: #333; color: white; border-radius: 6px;
            text-decoration: none; font-size: 11px; font-weight: 600;
        }

        /* FOLDER LIST OVERLAY (File Manager View) */
        #folderOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #121212;
            z-index: 2000;
            overflow-y: auto;
        }

        .folder-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: #1f1f1f;
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
        }

        .file-list { padding: 10px 0; }
        .file-item {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #222;
            cursor: pointer;
            transition: 0.2s;
        }
        .file-item:hover { background: #222; }
        .file-icon { color: #ffca28; font-size: 20px; margin-right: 15px; }
        .file-name { font-size: 14px; color: #eee; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .file-arrow { color: #555; font-size: 12px; }

        .telegram-btn {
            position: fixed; bottom: 25px; right: 25px;
            background: #229ED9; width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 999;
        }

        #status-msg { text-align: center; padding: 50px; color: #888; }
        @media(max-width: 600px) { .video-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo">REDROOM</div>
    </div>
    <div class="folder-btn" onclick="openFolder()">
        <i class="fas fa-folder-open"></i>
        <span>Folder</span>
    </div>
</header>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="Search videos..." onkeyup="filterVideos()">
</div>

<div id="status-msg">Loading...</div>
<div class="video-container" id="videoList"></div>

<div id="folderOverlay">
    <div class="folder-header">
        <div style="display:flex; align-items:center; gap:10px;">
            <i class="fas fa-chevron-left" onclick="closeFolder()" style="cursor:pointer; color:var(--primary-color);"></i>
            <span style="font-weight:600;">All Files</span>
        </div>
        <span style="font-size:12px; color:#777;" id="fileCount">0 Files</span>
    </div>
    <div class="file-list" id="fileListContainer">
        </div>
</div>

<a href="https://t.me/toXic_u0u" class="telegram-btn" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="25" alt="TG">
</a>

<script>
    let allVideos = [];
    const apiKey = "AIzaSyD7fZ8nt8LFa9iY8GfDBfhakIR2aqSE-Ms"; 
    const folderId = "1C78cLvYYP2AHaalMutvlJaNx0UjtgcIq";

    function getRandomViews() {
        const counts = ["1.2k", "2.5k", "3.1k", "1.7k", "4.2k"];
        return counts[Math.floor(Math.random() * counts.length)];
    }

    async function loadVideos() {
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${apiKey}&fields=files(id,name,mimeType)`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.files) {
                allVideos = data.files.filter(file => file.mimeType.includes("video"));
                document.getElementById("status-msg").style.display = "none";
                document.getElementById("fileCount").innerText = allVideos.length + " Files";
                renderVideos(allVideos);
            }
        } catch (e) { document.getElementById("status-msg").innerText = "Error loading data!"; }
    }

    function renderVideos(videos) {
        const list = document.getElementById("videoList");
        list.innerHTML = "";
        videos.forEach(file => {
            const card = document.createElement("div");
            card.className = "video-card";
            card.innerHTML = `
                <iframe src="https://drive.google.com/file/d/${file.id}/preview" allow="fullscreen"></iframe>
                <div class="video-info">
                    <div class="video-title">${file.name}</div>
                    <div class="btn-group">
                        <div class="view-stat"><i class="fas fa-eye"></i> ${getRandomViews()}</div>
                        <a href="https://drive.google.com/uc?export=download&id=${file.id}" class="download-btn">Download</a>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    // FOLDER FUNCTIONS
    function openFolder() {
        const container = document.getElementById("fileListContainer");
        container.innerHTML = "";
        
        allVideos.forEach(file => {
            const item = document.createElement("div");
            item.className = "file-item";
            item.onclick = () => playFile(file.id);
            item.innerHTML = `
                <i class="fas fa-video file-icon"></i>
                <div class="file-name">${file.name}</div>
                <i class="fas fa-chevron-right file-arrow"></i>
            `;
            container.appendChild(item);
        });
        
        document.getElementById("folderOverlay").style.display = "block";
        document.body.style.overflow = "hidden";
    }

    function closeFolder() {
        document.getElementById("folderOverlay").style.display = "none";
        document.body.style.overflow = "auto";
    }

    function playFile(id) {
        closeFolder();
        const selected = allVideos.filter(v => v.id === id);
        renderVideos(selected);
        window.scrollTo(0,0);
        document.getElementById("searchBox").value = "";
    }

    function filterVideos() {
        const query = document.getElementById("searchBox").value.toLowerCase();
        const filtered = allVideos.filter(v => v.name.toLowerCase().includes(query));
        renderVideos(filtered);
    }

    window.onload = loadVideos;
</script>

</body>
</html>
