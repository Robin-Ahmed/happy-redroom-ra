<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REDROOM | Premium Streaming</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-color: #e50914;
            --bg-dark: #0f0f0f;
            --card-bg: #1f1f1f;
            --text-white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg-dark); color: var(--text-white); overflow-x: hidden; }

        header {
            background: rgba(0, 0, 0, 0.9);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .logo { color: var(--primary-color); font-size: 24px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }

        /* Gallery Button */
        .gallery-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            background: #2a2a2a;
            padding: 6px 12px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            color: #eee;
            font-size: 12px;
            font-weight: 500;
        }
        .gallery-btn:hover { background: var(--primary-color); }

        .search-container { margin: 20px 5%; }
        #searchBox {
            width: 100%;
            padding: 12px 20px;
            background: var(--card-bg);
            border: 1px solid #333;
            border-radius: 30px;
            color: white;
            outline: none;
        }

        .video-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            padding: 0 5% 40px;
        }

        .video-card {
            background: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .video-card iframe { width: 100%; height: 180px; border: none; background: #000; }

        .video-info { padding: 12px; }
        .video-title { font-size: 13px; margin-bottom: 10px; height: 38px; overflow: hidden; color: #ddd; }

        .btn-group { display: flex; gap: 10px; }
        .view-stat {
            flex: 1;
            background: #262626;
            color: #aaa;
            padding: 8px;
            border-radius: 6px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
        }

        .download-btn {
            flex: 1;
            padding: 8px;
            text-align: center;
            background: #333;
            color: white;
            border-radius: 6px;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
        }

        /* FULLSCREEN GALLERY MODAL */
        #galleryOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            overflow-y: auto;
            padding: 20px;
        }

        .gallery-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 10px 0;
            border-bottom: 1px solid #222;
        }

        .close-gallery {
            font-size: 24px;
            color: var(--primary-color);
            cursor: pointer;
        }

        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }

        .gallery-item {
            aspect-ratio: 16/9;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }

        .gallery-item iframe { width: 100%; height: 100%; border: none; pointer-events: none; }
        
        /*Overlay to make it clickable*/
        .click-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            cursor: pointer; z-index: 5;
        }

        .telegram-btn {
            position: fixed; bottom: 25px; right: 25px;
            background: #229ED9; width: 55px; height: 55px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5); z-index: 999;
        }

        #status-msg { text-align: center; padding: 50px; color: #888; }
        @media(max-width: 600px) { .video-container { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo">REDROOM</div>
        <div class="gallery-btn" onclick="openGallery()">
            <i class="fas fa-images"></i>
            <span>All Video</span>
        </div>
    </div>
    <div style="font-size: 11px; color: #666;">Streaming</div>
</header>

<div class="search-container">
    <input type="text" id="searchBox" placeholder="Search videos..." onkeyup="filterVideos()">
</div>

<div id="status-msg">Loading...</div>
<div class="video-container" id="videoList"></div>

<div id="galleryOverlay">
    <div class="gallery-header">
        <h2 style="font-size: 18px;">Video Gallery</h2>
        <i class="fas fa-times close-gallery" onclick="closeGallery()"></i>
    </div>
    <div class="gallery-grid" id="galleryGrid"></div>
</div>

<a href="https://t.me/toXic_u0u" class="telegram-btn" target="_blank">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/82/Telegram_logo.svg" width="25" alt="TG">
</a>

<script>
    let allVideos = [];
    const apiKey = "AIzaSyD7fZ8nt8LFa9iY8GfDBfhakIR2aqSE-Ms"; 
    const folderId = "1C78cLvYYP2AHaalMutvlJaNx0UjtgcIq";

    function getRandomViews() {
        const counts = ["1.2k", "850", "2.5k", "3.1k", "920", "1.7k", "4.2k", "560"];
        return counts[Math.floor(Math.random() * counts.length)];
    }

    async function loadVideos() {
        const url = `https://www.googleapis.com/drive/v3/files?q='${folderId}'+in+parents+and+trashed=false&key=${apiKey}&fields=files(id,name,mimeType)`;
        try {
            const response = await fetch(url);
            const data = await response.json();
            if (data.files) {
                allVideos = data.files.filter(file => file.mimeType.includes("video"));
                document.getElementById("status-msg").style.display = "none";
                renderVideos(allVideos);
            }
        } catch (e) { document.getElementById("status-msg").innerText = "Error!"; }
    }

    function renderVideos(videos) {
        const list = document.getElementById("videoList");
        list.innerHTML = "";
        videos.forEach(file => {
            const card = document.createElement("div");
            card.className = "video-card";
            card.innerHTML = `
                <iframe src="https://drive.google.com/file/d/${file.id}/preview" allow="fullscreen"></iframe>
                <div class="video-info">
                    <div class="video-title">${file.name}</div>
                    <div class="btn-group">
                        <div class="view-stat"><i class="fas fa-eye"></i> ${getRandomViews()}</div>
                        <a href="https://drive.google.com/uc?export=download&id=${file.id}" class="download-btn">Download</a>
                    </div>
                </div>
            `;
            list.appendChild(card);
        });
    }

    // GALLERY FUNCTIONS
    function openGallery() {
        const grid = document.getElementById("galleryGrid");
        grid.innerHTML = "";
        allVideos.forEach(file => {
            const item = document.createElement("div");
            item.className = "gallery-item";
            item.innerHTML = `
                <iframe src="https://drive.google.com/file/d/${file.id}/preview"></iframe>
                <div class="click-layer" onclick="playFromGallery('${file.id}')"></div>
            `;
            grid.appendChild(item);
        });
        document.getElementById("galleryOverlay").style.display = "block";
        document.body.style.overflow = "hidden"; // Prevent background scroll
    }

    function closeGallery() {
        document.getElementById("galleryOverlay").style.display = "none";
        document.body.style.overflow = "auto";
    }

    function playFromGallery(id) {
        closeGallery();
        // Scroll to that specific video if needed, or just filter it
        const selected = allVideos.filter(v => v.id === id);
        renderVideos(selected);
        document.getElementById("searchBox").value = "Playing from Gallery...";
    }

    function filterVideos() {
        const query = document.getElementById("searchBox").value.toLowerCase();
        const filtered = allVideos.filter(v => v.name.toLowerCase().includes(query));
        renderVideos(filtered);
    }

    window.onload = loadVideos;
</script>

</body>
</html>
